<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>한국형 공포·탐욕지수 v2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&display=swap');

  :root{
    --bg:#0a0b0d;
    --panel:#101216;
    --ink:#f4f5f7;
    --muted:#8b8f99;
    --faint:#2a2d35;
    --line:#e8eaed;
    --extreme-fear:#e5484d;
    --fear:#f5a524;
    --neutral:#9aa0a6;
    --greed:#46a758;
    --extreme-greed:#27a567;
    --risk:#ff6b35;       /* 위험지수 라인 색 */
    --buffett:#c08cff;    /* 버핏 보조색 */
    --grad-top:#3bd07f;
    --grad-bot:#e5484d;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--ink);
    font-family:'IBM Plex Sans KR',system-ui,sans-serif;}
  body{
    min-height:100vh;display:flex;justify-content:center;
    background:
      radial-gradient(120% 60% at 80% -10%, rgba(59,208,127,.06), transparent 60%),
      radial-gradient(120% 60% at 0% 110%, rgba(229,72,77,.06), transparent 60%),
      var(--bg);
  }
  .app{width:100%;max-width:480px;padding:26px 22px 34px;}

  header .eyebrow{font-size:13px;letter-spacing:.04em;color:var(--muted);
    display:flex;align-items:center;gap:7px;font-weight:500}
  header .eyebrow .dot{width:7px;height:7px;border-radius:50%;background:var(--fear);
    box-shadow:0 0 10px currentColor}
  .value{font-family:'Fraunces',serif;font-weight:600;letter-spacing:-.02em;
    font-size:76px;line-height:.96;margin:10px 0 2px;font-variant-numeric:tabular-nums}
  .staterow{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
  .state{font-size:20px;font-weight:600}
  .change{font-family:'IBM Plex Mono',monospace;font-size:14px;color:var(--muted)}
  .change b{font-weight:500}

  .gauge{position:relative;height:8px;border-radius:99px;margin:18px 0 4px;overflow:hidden;
    background:linear-gradient(90deg,var(--extreme-fear),var(--fear) 32%,var(--neutral) 50%,var(--greed) 70%,var(--extreme-greed));}
  .gauge .mk{position:absolute;top:-4px;width:3px;height:16px;border-radius:2px;background:#fff;
    box-shadow:0 0 0 2px var(--bg);transition:left .5s cubic-bezier(.2,.8,.2,1)}
  .gaugelabels{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);
    font-family:'IBM Plex Mono',monospace;margin-top:6px}

  /* 보조 박스: 위험지수 + 버핏지수 */
  .subrow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
  .subbox{background:var(--panel);border:1px solid var(--faint);border-radius:12px;padding:12px 13px}
  .subbox .lbl{font-size:11px;color:var(--muted);letter-spacing:.02em;display:flex;align-items:center;gap:6px}
  .subbox .lbl .sw{width:10px;height:3px;border-radius:2px;display:inline-block}
  .subbox .val{font-family:'Fraunces',serif;font-weight:600;font-size:28px;line-height:1.1;margin-top:4px;font-variant-numeric:tabular-nums}
  .subbox .sub{font-size:11.5px;color:var(--muted);margin-top:2px}
  .subbox.risk .val{color:var(--risk)}
  .subbox.buffett .val{color:var(--buffett)}

  /* tabs */
  .tabs{display:flex;gap:4px;margin:22px 0 6px;background:var(--panel);padding:4px;border-radius:12px}
  .tabs button{flex:1;border:0;background:transparent;color:var(--muted);
    font-family:'IBM Plex Sans KR';font-size:13px;font-weight:600;padding:9px 0;border-radius:9px;
    cursor:pointer;transition:.18s}
  .tabs button.on{background:#23262d;color:var(--ink)}
  .tabs button:active{transform:scale(.97)}

  .chartwrap{position:relative;margin-top:8px}
  svg{display:block;width:100%;height:auto;overflow:visible}
  .tip{position:absolute;pointer-events:none;opacity:0;transform:translate(-50%,0);
    background:#191c22;border:1px solid var(--faint);border-radius:10px;padding:8px 11px;
    font-size:12px;white-space:nowrap;transition:opacity .12s;z-index:5;
    box-shadow:0 8px 24px rgba(0,0,0,.45);min-width:140px}
  .tip .td{color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:11px;margin-bottom:5px}
  .tip .row{display:flex;justify-content:space-between;gap:14px;font-variant-numeric:tabular-nums}
  .tip .row .k{color:var(--muted);font-size:11px}
  .tip .row .v{font-weight:700;font-size:13px}

  .controls{display:flex;justify-content:space-between;align-items:center;margin-top:18px;flex-wrap:wrap;gap:10px}
  .legend{display:flex;gap:13px;flex-wrap:wrap;font-size:11px;color:var(--muted)}
  .legend span{display:flex;align-items:center;gap:5px}
  .legend i{width:9px;height:3px;border-radius:2px;display:inline-block}
  .usbtn{border:1px solid var(--faint);background:transparent;color:var(--muted);
    font-family:'IBM Plex Sans KR';font-size:12px;font-weight:600;padding:7px 12px;border-radius:9px;cursor:pointer;
    display:flex;align-items:center;gap:7px;transition:.18s}
  .usbtn.on{color:var(--ink);border-color:#3a6ea5}
  .usbtn .sw{width:18px;height:3px;border-radius:2px;background:#5b8fd6;opacity:.4;transition:.18s}
  .usbtn.on .sw{opacity:1}

  footer{margin-top:24px;font-size:12px;color:var(--muted);line-height:1.65;
    border-top:1px solid var(--faint);padding-top:14px}
  footer b{color:#cfd2d8;font-weight:600}
  footer .row{margin:6px 0}
  .badge{display:inline-block;background:#2a1f12;color:var(--fear);border:1px solid #5a3d15;
    font-size:10.5px;font-weight:600;padding:2px 7px;border-radius:6px;margin-right:6px}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="eyebrow"><span class="dot" id="dot"></span> 한국형 공포·탐욕지수 <span style="opacity:.5">· KOSPI v2</span></div>
    <div class="value" id="bigval">–</div>
    <div class="staterow">
      <div class="state" id="state">–</div>
      <div class="change" id="change"></div>
    </div>
    <div class="gauge"><div class="mk" id="mk"></div></div>
    <div class="gaugelabels"><span>0 극단적 공포</span><span>50</span><span>극단적 탐욕 100</span></div>

    <!-- 위험지수 + 버핏지수 -->
    <div class="subrow">
      <div class="subbox risk">
        <div class="lbl"><span class="sw" style="background:var(--risk)"></span>위험지수 <span style="opacity:.5">(높을수록 불안정)</span></div>
        <div class="val" id="riskval">–</div>
        <div class="sub" id="risksub">–</div>
      </div>
      <div class="subbox buffett">
        <div class="lbl"><span class="sw" style="background:var(--buffett)"></span>버핏지수 <span style="opacity:.5">시총÷GDP</span></div>
        <div class="val" id="bufval">–</div>
        <div class="sub" id="bufsub">–</div>
      </div>
    </div>
  </header>

  <div class="tabs" id="tabs">
    <button data-d="7">1주</button>
    <button data-d="30">1개월</button>
    <button data-d="90">3개월</button>
    <button data-d="365" class="on">1년</button>
    <button data-d="0">전체</button>
  </div>

  <div class="chartwrap">
    <svg id="chart" viewBox="0 0 480 300" preserveAspectRatio="none"></svg>
    <div class="tip" id="tip"></div>
  </div>

  <div class="controls">
    <div class="legend">
      <span><i style="background:linear-gradient(90deg,#e5484d,#e9c46a,#3bd07f)"></i>탐욕지수</span>
      <span><i style="background:var(--risk)"></i>위험지수</span>
    </div>
    <button class="usbtn" id="usbtn"><span class="sw"></span>미국 비교</button>
  </div>

  <footer id="note">
    <span class="badge">예시 데이터</span>같은 폴더에 <b>history.json</b>(korea_fng.py 실행 결과)을 두고 호스팅하면 실제 지수로 바뀝니다.
    <div class="row" style="margin-top:10px"><b>탐욕지수</b>: 가격이 얼마나 달리는지 (0~100, 높을수록 과열)</div>
    <div class="row"><b>위험지수</b>: 시장이 얼마나 흔들리는지 (0~100, 높을수록 위험)</div>
    <div class="row"><b>버핏지수</b>: 코스피+코스닥 시가총액을 한국 GDP로 나눈 비율 (%). 100%면 시장 = 1년 경제 규모.</div>
  </footer>
</div>

<script>
/* =========================================================================
   history.json 형식 (v2):
     { "kr"  : [{"d":"YYYY-MM-DD","v":number}, ...],   // 탐욕지수
       "risk": [{"d":"YYYY-MM-DD","v":number}, ...],   // 위험지수 (선택)
       "us"  : [{"d":"YYYY-MM-DD","v":number|null}],   // 미국 CNN (선택)
       "buffett": {"d":"...","ratio":246.0,"score":100.0} // 오늘값 (선택)
     }
   v1 처럼 risk/buffett 가 없으면 그 부분만 자동으로 숨겨진다.
   ========================================================================= */

function generateSample(){
  let s = 20260531;
  const rnd = () => (s = (s*1103515245 + 12345) & 0x7fffffff) / 0x7fffffff;
  const clamp = (v,a,b) => Math.max(a, Math.min(b, v));
  function walk(seed, mean){
    s = seed; let v = mean, out = [];
    const start = new Date('2023-01-01'), end = new Date();
    let t = 0;
    for(let dt = new Date(start); dt <= end; dt.setDate(dt.getDate()+1)){
      const wd = dt.getDay();
      if(wd === 0 || wd === 6) continue;
      t++;
      const regime = 12 * Math.sin(t/120) + 6 * Math.sin(t/37);
      const drift  = (mean + regime - v) * 0.05;
      const shock  = (rnd() - 0.5) * 7;
      v = clamp(v + drift + shock, 3, 97);
      out.push({ d: dt.toISOString().slice(0,10), v: Math.round(v*10)/10 });
    }
    return out;
  }
  return {
    kr  : walk(11, 70),         // 탐욕 (요즘 장세 가정)
    risk: walk(91, 65),         // 위험
    us  : walk(73, 58),
    buffett: { d:'2026-05-31', ratio: 246.0, score: 100.0 }
  };
}

function zone(v){
  if(v < 25) return {name:'극단적 공포', c:getCss('--extreme-fear')};
  if(v < 45) return {name:'공포',       c:getCss('--fear')};
  if(v < 55) return {name:'중립',       c:getCss('--neutral')};
  if(v < 75) return {name:'탐욕',       c:getCss('--greed')};
  return        {name:'극단적 탐욕', c:getCss('--extreme-greed')};
}
function riskLabel(v){
  if(v == null) return '–';
  if(v < 25) return '매우 안정';
  if(v < 45) return '안정';
  if(v < 55) return '보통';
  if(v < 75) return '주의';
  return '위험';
}
function buffettLabel(r){
  if(r == null) return '–';
  if(r < 70)  return '저평가 구간';
  if(r < 90)  return '약간 저평가';
  if(r < 110) return '적정 부근';
  if(r < 130) return '고평가';
  return '극단 고평가';
}
function getCss(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }

const VB_W = 480, VB_H = 300;
const PAD = {l:8, r:8, t:26, b:24};
const plotW = VB_W - PAD.l - PAD.r;
const plotH = VB_H - PAD.t - PAD.b;
const yOf = v => PAD.t + (1 - v/100) * plotH;

let DATA = null;
let windowDays = 365;
let showUS = false;
let viewKR = [], viewRisk = [];

function sliceWindow(arr){
  if(!windowDays || !arr) return arr ? arr.slice() : [];
  return arr.slice(Math.max(0, arr.length - windowDays));
}

function smoothPath(pts){
  if(pts.length < 2) return '';
  let d = `M ${pts[0].x},${pts[0].y}`;
  for(let i=0;i<pts.length-1;i++){
    const p0=pts[i-1]||pts[i], p1=pts[i], p2=pts[i+1], p3=pts[i+2]||p2;
    const c1x=p1.x+(p2.x-p0.x)/6, c1y=p1.y+(p2.y-p0.y)/6;
    const c2x=p2.x-(p3.x-p1.x)/6, c2y=p2.y-(p3.y-p1.y)/6;
    d += ` C ${c1x},${c1y} ${c2x},${c2y} ${p2.x},${p2.y}`;
  }
  return d;
}

function ptsFrom(arr){
  const n = arr.length;
  return arr.map((o,i)=>({ x: PAD.l + (n<=1?0:(i/(n-1))*plotW), y: yOf(o.v), v:o.v, d:o.d }));
}

function render(){
  const svg = document.getElementById('chart');
  viewKR = sliceWindow(DATA.kr);
  viewRisk = sliceWindow(DATA.risk);
  const kr = ptsFrom(viewKR);
  const n = kr.length;
  if(!n){ svg.innerHTML=''; return; }

  const bands = [[0,25,'--extreme-fear'],[25,45,'--fear'],[45,55,'--neutral'],[55,75,'--greed'],[75,100,'--extreme-greed']];
  let bg = bands.map(([lo,hi,c])=>{
    const y=yOf(hi), h=yOf(lo)-yOf(hi);
    return `<rect x="0" y="${y}" width="${VB_W}" height="${h}" fill="${getCss(c)}" opacity="0.07"/>`;
  }).join('');
  [25,50,75].forEach(g=>{
    bg += `<line x1="0" y1="${yOf(g)}" x2="${VB_W}" y2="${yOf(g)}" stroke="${getCss('--faint')}" stroke-width="1" stroke-dasharray="2 4"/>`;
  });

  // 위험지수 라인 (선만, 영역 채움 없음)
  let riskLine = '';
  if(viewRisk && viewRisk.length){
    const rPts = ptsFrom(viewRisk).filter(p => p.v != null && !isNaN(p.v));
    if(rPts.length > 1){
      riskLine = `<path d="${smoothPath(rPts)}" fill="none" stroke="${getCss('--risk')}" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round" opacity="0.85"/>`;
    }
  }

  // 미국 비교선
  let usLine = '';
  if(showUS && DATA.us){
    const usArr = sliceWindow(DATA.us);
    const n2 = usArr.length;
    const us = usArr.map((o,i)=>({
        x: PAD.l + (n2<=1?0:(i/(n2-1))*plotW), y: yOf(o.v)
      })).filter(p => p.y != null && !isNaN(p.y));
    if(us.length > 1)
      usLine = `<path d="${smoothPath(us)}" fill="none" stroke="#5b8fd6" stroke-width="1.6" stroke-dasharray="3 4" opacity="0.7"/>`;
  }

  const linePath = smoothPath(kr);
  const area = linePath + ` L ${kr[n-1].x},${yOf(0)} L ${kr[0].x},${yOf(0)} Z`;

  let lo=kr[0], hi=kr[0];
  kr.forEach(p=>{ if(p.v<lo.v)lo=p; if(p.v>hi.v)hi=p; });
  const last = kr[n-1];
  const labelXY=(p)=>{ let x=p.x; x=Math.max(34,Math.min(VB_W-34,x)); return x; };

  svg.innerHTML = `
    <defs>
      <linearGradient id="stroke" gradientUnits="userSpaceOnUse" x1="0" y1="${yOf(100)}" x2="0" y2="${yOf(0)}">
        <stop offset="0" stop-color="${getCss('--grad-top')}"/>
        <stop offset="0.5" stop-color="#e9c46a"/>
        <stop offset="1" stop-color="${getCss('--grad-bot')}"/>
      </linearGradient>
      <linearGradient id="fill" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="${zone(last.v).c}" stop-opacity="0.22"/>
        <stop offset="1" stop-color="${zone(last.v).c}" stop-opacity="0"/>
      </linearGradient>
    </defs>
    ${bg}
    ${usLine}
    ${riskLine}
    <path d="${area}" fill="url(#fill)"/>
    <path d="${linePath}" fill="none" stroke="url(#stroke)" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>

    <circle cx="${hi.x}" cy="${hi.y}" r="3" fill="${getCss('--extreme-greed')}"/>
    <text x="${labelXY(hi)}" y="${hi.y-9}" text-anchor="middle" fill="${getCss('--greed')}" font-size="11" font-family="IBM Plex Mono">최고 ${hi.v}</text>
    <circle cx="${lo.x}" cy="${lo.y}" r="3" fill="${getCss('--extreme-fear')}"/>
    <text x="${labelXY(lo)}" y="${lo.y+17}" text-anchor="middle" fill="${getCss('--extreme-fear')}" font-size="11" font-family="IBM Plex Mono">최저 ${lo.v}</text>
    <circle cx="${last.x}" cy="${last.y}" r="4" fill="#fff"/>
    <circle cx="${last.x}" cy="${last.y}" r="8" fill="${zone(last.v).c}" opacity="0.25"/>

    <rect id="hit" x="0" y="0" width="${VB_W}" height="${VB_H}" fill="transparent" style="cursor:crosshair"/>
    <line id="guide" x1="0" y1="${PAD.t}" x2="0" y2="${PAD.t+plotH}" stroke="#fff" stroke-width="1" opacity="0"/>
    <circle id="gdot" r="4" fill="#fff" opacity="0"/>
  `;
  bindHover(kr);
  updateHeader();
}

function updateHeader(){
  const last = DATA.kr[DATA.kr.length-1];
  const prev = DATA.kr[DATA.kr.length-2] || last;
  const z = zone(last.v);
  document.getElementById('bigval').textContent = last.v;
  const st = document.getElementById('state'); st.textContent = z.name; st.style.color = z.c;
  document.getElementById('dot').style.background = z.c;
  const diff = Math.round((last.v - prev.v)*10)/10;
  const arrow = diff>0?'▲':diff<0?'▼':'–';
  const col = diff>0?getCss('--greed'):diff<0?getCss('--extreme-fear'):getCss('--muted');
  document.getElementById('change').innerHTML = `직전 대비 <b style="color:${col}">${arrow} ${Math.abs(diff)}</b>`;
  document.getElementById('mk').style.left = `calc(${last.v}% - 1.5px)`;

  // 위험지수
  const riskEl = document.getElementById('riskval');
  const riskSub = document.getElementById('risksub');
  if(DATA.risk && DATA.risk.length){
    const r = DATA.risk[DATA.risk.length-1].v;
    riskEl.textContent = r;
    riskSub.textContent = riskLabel(r);
  } else {
    riskEl.textContent = '–'; riskSub.textContent = '데이터 없음';
  }

  // 버핏지수
  const bufEl = document.getElementById('bufval');
  const bufSub = document.getElementById('bufsub');
  if(DATA.buffett && DATA.buffett.ratio != null){
    bufEl.textContent = Math.round(DATA.buffett.ratio) + '%';
    bufSub.textContent = buffettLabel(DATA.buffett.ratio) + ` · 점수 ${Math.round(DATA.buffett.score)}`;
  } else {
    bufEl.textContent = '–'; bufSub.textContent = '데이터 없음';
  }
}

function bindHover(kr){
  const svg=document.getElementById('chart'), hit=document.getElementById('hit');
  const guide=document.getElementById('guide'), gdot=document.getElementById('gdot');
  const tip=document.getElementById('tip'), wrap=svg.parentElement;

  function toIdx(clientX){
    const r=svg.getBoundingClientRect();
    const xv=(clientX-r.left)/r.width*VB_W;
    const n=kr.length;
    let i=Math.round((xv-PAD.l)/plotW*(n-1));
    return Math.max(0,Math.min(n-1,i));
  }
  function move(clientX){
    const i=toIdx(clientX), p=kr[i], z=zone(p.v);
    guide.setAttribute('x1',p.x); guide.setAttribute('x2',p.x); guide.setAttribute('opacity','0.25');
    gdot.setAttribute('cx',p.x); gdot.setAttribute('cy',p.y); gdot.setAttribute('opacity','1');
    gdot.setAttribute('fill',z.c);
    const r=svg.getBoundingClientRect();
    const px=p.x/VB_W*r.width, py=p.y/VB_H*r.height;
    const rv = (viewRisk && viewRisk[i]) ? viewRisk[i].v : null;
    tip.style.opacity='1';
    tip.style.left=Math.max(74,Math.min(wrap.clientWidth-74,px))+'px';
    tip.style.top=Math.max(0,py-78)+'px';
    tip.innerHTML =
      `<div class="td">${p.d}</div>`
      + `<div class="row"><span class="k">탐욕</span><span class="v" style="color:${z.c}">${p.v} <span style="font-size:10px;font-weight:500">${z.name}</span></span></div>`
      + (rv != null ? `<div class="row"><span class="k">위험</span><span class="v" style="color:${getCss('--risk')}">${rv} <span style="font-size:10px;font-weight:500">${riskLabel(rv)}</span></span></div>` : '');
  }
  function hide(){ guide.setAttribute('opacity','0'); gdot.setAttribute('opacity','0'); tip.style.opacity='0'; }

  hit.addEventListener('mousemove', e=>move(e.clientX));
  hit.addEventListener('mouseleave', hide);
  hit.addEventListener('touchstart', e=>move(e.touches[0].clientX), {passive:true});
  hit.addEventListener('touchmove', e=>move(e.touches[0].clientX), {passive:true});
  hit.addEventListener('touchend', hide);
}

document.getElementById('tabs').addEventListener('click', e=>{
  const b=e.target.closest('button'); if(!b) return;
  [...document.querySelectorAll('#tabs button')].forEach(x=>x.classList.remove('on'));
  b.classList.add('on');
  windowDays = +b.dataset.d;
  render();
});
document.getElementById('usbtn').addEventListener('click', e=>{
  showUS=!showUS;
  e.currentTarget.classList.toggle('on', showUS);
  render();
});

function boot(data){ DATA=data; render(); }
function markReal(){
  const n=document.getElementById('note');
  if(n) n.innerHTML=
    '<span class="badge" style="background:#10241a;color:#46a758;border-color:#1f5236">실제 데이터</span>'
    + 'history.json 을 불러왔습니다. korea_fng.py 를 다시 실행하면 이 차트도 갱신됩니다.'
    + '<div class="row" style="margin-top:10px"><b>탐욕지수</b>: 가격이 얼마나 달리는지 (0~100, 높을수록 과열)</div>'
    + '<div class="row"><b>위험지수</b>: 시장이 얼마나 흔들리는지 (0~100, 높을수록 위험)</div>'
    + '<div class="row"><b>버핏지수</b>: 코스피+코스닥 시가총액을 한국 GDP로 나눈 비율 (%). 100%면 시장 = 1년 경제 규모.</div>';
}
// ?t=타임스탬프 + no-store : GitHub Pages·노션 임베드가 옛 history.json을 캐시해서
// 새로 올려도 안 바뀌는 문제를 막는다(매번 새 주소로 요청 -> 무조건 최신 파일).
fetch('history.json?t=' + Date.now(), { cache: 'no-store' })
  .then(r => { if(!r.ok) throw new Error('no file'); return r.json(); })
  .then(d => { boot(d); markReal(); })
  .catch(() => boot(generateSample()));
</script>
