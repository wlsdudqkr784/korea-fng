<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>한국형 공포·탐욕지수</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&display=swap');

  :root{
    /* ====== 하얀(라이트) 테마 ====== */
    --bg:#ffffff;
    --panel:#f1f3f6;
    --ink:#16191f;
    --muted:#6b7280;
    --faint:#e4e7ec;
    --line:#e8eaed;
    --extreme-fear:#e5484d;
    --fear:#e08e0b;          /* 흰 배경에서 잘 보이게 약간 진한 주황 */
    --neutral:#9aa0a6;
    --greed:#2f9e44;
    --extreme-greed:#157f43;
    --grad-top:#1f9e54;      /* 탐욕(높음) */
    --grad-bot:#e5484d;      /* 공포(낮음) */
    --us:#2f6df0;            /* 미국 비교선 — 또렷한 파랑 */
    --buf:#a855f7;           /* 버핏지수 — 보라 */
    --up:#e5484d;            /* 드래그 상승(+) 빨강 */
    --down:#2563eb;          /* 드래그 하락(-) 파랑 */
    --xgreed:#a855f7;        /* 극단적 탐욕 보라 */
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--ink);
    font-family:'IBM Plex Sans KR',system-ui,sans-serif;}
  body{
    min-height:100vh;display:flex;justify-content:center;
    background:
      radial-gradient(120% 60% at 80% -10%, rgba(47,158,68,.05), transparent 60%),
      radial-gradient(120% 60% at 0% 110%, rgba(229,72,77,.05), transparent 60%),
      var(--bg);
  }
  .app{width:100%;max-width:480px;padding:26px 22px 34px;}

  header .eyebrow{font-size:13px;letter-spacing:.04em;color:var(--muted);
    display:flex;align-items:center;gap:7px;font-weight:500}
  header .eyebrow .dot{width:7px;height:7px;border-radius:50%;background:var(--fear);
    box-shadow:0 0 8px currentColor}
  .value{font-family:'Fraunces',serif;font-weight:600;letter-spacing:-.02em;
    font-size:76px;line-height:.96;margin:10px 0 2px;font-variant-numeric:tabular-nums}
  .staterow{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
  .state{font-size:20px;font-weight:600}
  .change{font-family:'IBM Plex Mono',monospace;font-size:14px;color:var(--muted)}
  .change b{font-weight:500}

  /* gauge strip */
  .gauge{position:relative;height:8px;border-radius:99px;margin:20px 0 4px;overflow:hidden;
    background:linear-gradient(90deg,var(--extreme-fear),var(--fear) 32%,var(--neutral) 50%,var(--greed) 70%,var(--extreme-greed));}
  .gauge .mk{position:absolute;top:-4px;width:3px;height:16px;border-radius:2px;background:#16191f;
    box-shadow:0 0 0 2px #fff;transition:left .5s cubic-bezier(.2,.8,.2,1)}
  .gaugelabels{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);
    font-family:'IBM Plex Mono',monospace;margin-top:6px}

  /* tabs */
  .tabs{display:flex;gap:4px;margin:22px 0 6px;background:var(--panel);padding:4px;border-radius:12px}
  .tabs button{flex:1;border:0;background:transparent;color:var(--muted);
    font-family:'IBM Plex Sans KR';font-size:13px;font-weight:600;padding:9px 0;border-radius:9px;
    cursor:pointer;transition:.18s}
  .tabs button.on{background:#fff;color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.10)}
  .tabs button:active{transform:scale(.97)}

  .chartwrap{position:relative;margin-top:8px}
  svg{display:block;width:100%;height:auto;overflow:visible;touch-action:none}
  .tip{position:absolute;pointer-events:none;opacity:0;transform:translate(-50%,0);
    background:#ffffff;border:1px solid var(--faint);border-radius:10px;padding:8px 11px;
    font-size:12px;white-space:nowrap;transition:opacity .1s;z-index:5;
    box-shadow:0 8px 24px rgba(0,0,0,.14)}
  .tip .td{color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:11px;margin-bottom:4px}
  .tip .row{display:flex;align-items:center;gap:6px;margin-top:3px}
  .tip .row .dotc{width:8px;height:8px;border-radius:2px;flex:none}
  .tip .row .lab{color:var(--muted);font-size:11px;min-width:28px}
  .tip .row .vv{font-weight:700;font-size:14px;font-variant-numeric:tabular-nums}
  .tip .row .sub{font-size:10.5px;color:var(--muted);margin-left:2px}

  /* 드래그 상태창(구글 주식창처럼 위쪽 빈 곳에 표시) */
  .dragstat{position:absolute;top:0;left:50%;transform:translateX(-50%);
    pointer-events:none;opacity:0;transition:opacity .08s;z-index:6;
    font-family:'IBM Plex Mono',monospace;font-size:12.5px;font-weight:600;white-space:nowrap;
    background:rgba(255,255,255,.94);border:1px solid var(--faint);border-radius:8px;
    padding:4px 10px;box-shadow:0 4px 14px rgba(0,0,0,.12)}

  .controls{display:flex;justify-content:space-between;align-items:center;margin-top:18px;
    flex-wrap:wrap;gap:10px}
  .legend{display:flex;gap:13px;flex-wrap:wrap;font-size:11px;color:var(--muted)}
  .legend span{display:flex;align-items:center;gap:5px}
  .legend i{width:9px;height:9px;border-radius:3px;display:inline-block}
  .btns{display:flex;gap:6px;flex-wrap:wrap}
  .tgl{border:1px solid var(--faint);background:#fff;color:var(--muted);
    font-family:'IBM Plex Sans KR';font-size:12px;font-weight:600;padding:7px 12px;border-radius:9px;cursor:pointer;
    display:flex;align-items:center;gap:7px;transition:.18s}
  .tgl .sw{width:18px;height:3px;border-radius:2px;opacity:.35;transition:.18s}
  .tgl.on{color:var(--ink)}
  .tgl.on .sw{opacity:1}
  .krbtn .sw{background:linear-gradient(90deg,var(--extreme-fear),var(--extreme-greed))}
  .krbtn.on{border-color:#2f9e44}
  .usbtn .sw{background:var(--us)}
  .usbtn.on{border-color:var(--us)}
  .bufbtn .sw{background:var(--buf)}
  .bufbtn.on{border-color:var(--buf)}

  footer{margin-top:24px;font-size:11.5px;color:var(--muted);line-height:1.6;
    border-top:1px solid var(--faint);padding-top:14px}
  footer b{color:#3a3f47;font-weight:600}
  .badge{display:inline-block;background:#fdf3e2;color:#b9770b;border:1px solid #f1d9a8;
    font-size:10.5px;font-weight:600;padding:2px 7px;border-radius:6px;margin-right:6px}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="eyebrow"><span class="dot" id="dot"></span> 한국형 공포·탐욕지수 <span style="opacity:.5">· KOSPI</span></div>
    <div class="value" id="bigval">–</div>
    <div class="staterow">
      <div class="state" id="state">–</div>
      <div class="change" id="change"></div>
    </div>
    <div class="gauge"><div class="mk" id="mk"></div></div>
    <div class="gaugelabels"><span>0 극단적 공포</span><span>50</span><span>극단적 탐욕 100</span></div>
  </header>

  <div class="tabs" id="tabs">
    <button data-d="7">1주</button>
    <button data-d="30">1개월</button>
    <button data-d="90">3개월</button>
    <button data-d="365" class="on">1년</button>
    <button data-d="0">전체</button>
  </div>

  <div class="chartwrap">
    <svg id="chart" viewBox="0 0 480 300" preserveAspectRatio="none"></svg>
    <div class="tip" id="tip"></div>
    <div class="dragstat" id="dragstat"></div>
  </div>

  <div class="controls">
    <div class="legend">
      <span><i style="background:var(--extreme-fear)"></i>공포</span>
      <span><i style="background:var(--neutral)"></i>중립</span>
      <span><i style="background:var(--extreme-greed)"></i>탐욕</span>
    </div>
    <div class="btns">
      <button class="tgl krbtn on" id="krbtn"><span class="sw"></span>한국</button>
      <button class="tgl usbtn" id="usbtn"><span class="sw"></span>미국 비교</button>
      <button class="tgl bufbtn" id="bufbtn"><span class="sw"></span>버핏지수</button>
    </div>
  </div>

  <footer id="note">
    <span class="badge">예시 데이터</span>지금은 구조 확인용 <b>임의 생성 데이터</b>입니다.
    같은 폴더에 <b>history.json</b>(korea_fng.py 실행 결과)을 두고 웹서버/호스팅으로 열면 <b>자동으로 실제 지수</b>로 바뀝니다.
  </footer>
</div>

<script>
/* =========================================================================
   - history.json 이 있으면 실제 지수, 없으면 generateSample() 예시로 표시
   - file:// 로 직접 열면 fetch 가 막혀 예시(아래)로 뜬다 → 예시는 2017년부터 생성
   - history.json 형식(날짜 오름차순):
       { "kr":[{"d":"2024-01-02","v":51.3}, ...],
         "us":[{"d":"2024-01-02","v":62.0}, ...] }   // us.v 는 null 가능
   ========================================================================= */

/* JS 오류가 나면 화면 하단에 그대로 보여줘서 바로 공유할 수 있게 한다 */
window.addEventListener('error', e=>{
  const n=document.getElementById('note');
  if(n) n.innerHTML='<span class="badge" style="background:#fde2e2;color:#c0392b;border-color:#f5b5b5">오류</span>'
    + (e.message||'알 수 없는 오류') + ' @ ' + (e.filename||'') + ':' + (e.lineno||'');
});

function generateSample(){
  let s = 20260529;
  const rnd = () => (s = (s*1103515245 + 12345) & 0x7fffffff) / 0x7fffffff;
  const clamp = (v,a,b) => Math.max(a, Math.min(b, v));

  function walk(seed, mean){
    s = seed; let v = mean, out = [];
    const start = new Date('2017-01-01'), end = new Date();   // ← 2017년부터
    let t = 0;
    for(let dt = new Date(start); dt <= end; dt.setDate(dt.getDate()+1)){
      const wd = dt.getDay();
      if(wd === 0 || wd === 6) continue;            // 주말 제외
      t++;
      const regime = 12 * Math.sin(t/120) + 6 * Math.sin(t/37);
      const drift  = (mean + regime - v) * 0.05;
      const shock  = (rnd() - 0.5) * 7;
      v = clamp(v + drift + shock, 3, 97);
      out.push({ d: dt.toISOString().slice(0,10), v: Math.round(v*10)/10 });
    }
    return out;
  }
  // 버핏지수용: 110~230% 범위에서 천천히 변하는 예시
  function walkBuf(seed){
    s = seed; let v = 170, out = [];
    const start = new Date('2017-01-01'), end = new Date();   // ← 2017년부터
    let t = 0;
    for(let dt = new Date(start); dt <= end; dt.setDate(dt.getDate()+1)){
      const wd = dt.getDay();
      if(wd === 0 || wd === 6) continue;
      t++;
      const regime = 18 * Math.sin(t/150);
      const drift  = (170 + regime - v) * 0.04;
      const shock  = (rnd() - 0.5) * 2.2;
      v = clamp(v + drift + shock, 110, 230);
      out.push({ d: dt.toISOString().slice(0,10), v: Math.round(v*10)/10 });
    }
    return out;
  }
  return { kr: walk(11, 48), us: walk(73, 58), buf: walkBuf(900) };
}

/* ---------- 구간/색 ---------- */
function zone(v){
  if(v < 25) return {name:'극단적 공포', c:getCss('--extreme-fear')};
  if(v < 45) return {name:'공포',       c:getCss('--fear')};
  if(v < 55) return {name:'중립',       c:getCss('--neutral')};
  if(v < 75) return {name:'탐욕',       c:getCss('--greed')};
  return        {name:'극단적 탐욕', c:getCss('--extreme-greed')};
}
function getCss(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }

/* 16진수 색 보간 (red → purple 등) */
function lerpColor(a,b,t){
  t=Math.max(0,Math.min(1,t));
  const pa=[parseInt(a.slice(1,3),16),parseInt(a.slice(3,5),16),parseInt(a.slice(5,7),16)];
  const pb=[parseInt(b.slice(1,3),16),parseInt(b.slice(3,5),16),parseInt(b.slice(5,7),16)];
  const c=pa.map((x,i)=>Math.round(x+(pb[i]-x)*t));
  return '#'+c.map(x=>x.toString(16).padStart(2,'0')).join('');
}

/* ---------- 차트 렌더 ---------- */
const VB_W = 480, VB_H = 300;
const PAD = {l:8, r:8, t:34, b:24};
const plotW = VB_W - PAD.l - PAD.r;
const plotH = VB_H - PAD.t - PAD.b;
const yOf = v => PAD.t + (1 - v/100) * plotH;

let DATA = null;
let windowDays = 365;
let showKR = true;        // 한국 지수 표시 여부 (끄면 그래프에서 숨김)
let showUS = false;
let showBUF = false;

let viewKR=[], viewUS=[], viewBUF=[];   // 현재 창에 보이는 데이터
let krPts=[], usPts=[], bufPts=[];      // 화면 좌표로 변환된 점들

function sliceWindow(arr){
  if(!arr) return [];
  if(!windowDays) return arr.slice();
  return arr.slice(Math.max(0, arr.length - windowDays));
}
function smoothPath(pts){
  if(pts.length < 2) return '';
  let d = `M ${pts[0].x},${pts[0].y}`;
  for(let i=0;i<pts.length-1;i++){
    const p0=pts[i-1]||pts[i], p1=pts[i], p2=pts[i+1], p3=pts[i+2]||p2;
    const c1x=p1.x+(p2.x-p0.x)/6, c1y=p1.y+(p2.y-p0.y)/6;
    const c2x=p2.x-(p3.x-p1.x)/6, c2y=p2.y-(p3.y-p1.y)/6;
    d += ` C ${c1x},${c1y} ${c2x},${c2y} ${p2.x},${p2.y}`;
  }
  return d;
}

function render(){
  const svg = document.getElementById('chart');

  viewKR  = sliceWindow(DATA.kr);
  viewUS  = DATA.us  ? sliceWindow(DATA.us)  : [];
  viewBUF = DATA.buf ? sliceWindow(DATA.buf) : [];

  const n = viewKR.length;
  if(!n){ svg.innerHTML=''; return; }

  // 한국 좌표(항상 계산 — 숨겨도 x축/호버/드래그 기준으로 사용)
  krPts = viewKR.map((o,i)=>({ x: PAD.l + (n<=1?0:(i/(n-1))*plotW), y: yOf(o.v), v:o.v, d:o.d }));

  // 미국 좌표(같은 0~100 축, null 은 y=null)
  usPts = viewUS.map((o,i)=>({
    x: PAD.l + (n<=1?0:(i/(n-1))*plotW),
    y: (o.v==null||isNaN(o.v)) ? null : yOf(o.v), v:o.v, d:o.d
  }));

  // 배경 감정 구간 띠
  const bands = [[0,25,'--extreme-fear'],[25,45,'--fear'],[45,55,'--neutral'],[55,75,'--greed'],[75,100,'--extreme-greed']];
  let bg = bands.map(([lo,hi,c])=>{
    const y=yOf(hi), h=yOf(lo)-yOf(hi);
    return `<rect x="0" y="${y}" width="${VB_W}" height="${h}" fill="${getCss(c)}" opacity="0.09"/>`;
  }).join('');
  [25,50,75].forEach(g=>{
    bg += `<line x1="0" y1="${yOf(g)}" x2="${VB_W}" y2="${yOf(g)}" stroke="${getCss('--faint')}" stroke-width="1" stroke-dasharray="2 4"/>`;
  });

  // 미국 비교선 — 또렷한 파랑
  let usLine = '';
  if(showUS){
    const us = usPts.filter(p => p.y != null);
    if(us.length > 1)
      usLine = `<path d="${smoothPath(us)}" fill="none" stroke="${getCss('--us')}" stroke-width="2" stroke-dasharray="5 3" opacity="0.95"/>`;
  }

  // 버핏지수(오른쪽 % 축, 자동 스케일)
  let bufLine = '', bufAxis = '';
  bufPts = [];
  if(showBUF && viewBUF.length){
    const vals = viewBUF.map(o=>o.v).filter(v=>v!=null && !isNaN(v));
    if(vals.length > 1){
      let mn = Math.min(...vals), mx = Math.max(...vals);
      const padv = (mx-mn)*0.12 || 5; mn -= padv; mx += padv;
      const yBuf = val => PAD.t + (1 - (val-mn)/(mx-mn)) * plotH;
      bufPts = viewBUF.map((o,i)=>({
        x: PAD.l + (n<=1?0:(i/(n-1))*plotW),
        y: (o.v==null||isNaN(o.v)) ? null : yBuf(o.v), v:o.v, d:o.d
      }));
      const bp = bufPts.filter(p => p.y != null);
      if(bp.length > 1){
        bufLine = `<path d="${smoothPath(bp)}" fill="none" stroke="${getCss('--buf')}" stroke-width="1.8" opacity="0.9"/>`;
        const ticks = [mn + (mx-mn)*0.08, (mn+mx)/2, mx - (mx-mn)*0.08];
        bufAxis = ticks.map(t =>
          `<text x="${VB_W-PAD.r}" y="${yBuf(t)+3}" text-anchor="end" fill="${getCss('--buf')}" `
          + `font-size="10" font-family="IBM Plex Mono" opacity="0.85">${Math.round(t)}%</text>`
        ).join('');
      }
    }
  }

  // 한국 라인 + 영역 + 최고/최저/현재 (showKR 일 때만)
  let krSvg = '';
  const last = krPts[n-1];
  if(showKR){
    const linePath = smoothPath(krPts);
    const area = linePath + ` L ${krPts[n-1].x},${yOf(0)} L ${krPts[0].x},${yOf(0)} Z`;
    let lo=krPts[0], hi=krPts[0];
    krPts.forEach(p=>{ if(p.v<lo.v)lo=p; if(p.v>hi.v)hi=p; });
    const labelX=(p)=>Math.max(34,Math.min(VB_W-34,p.x));
    krSvg = `
      <path d="${area}" fill="url(#fill)"/>
      <path d="${linePath}" fill="none" stroke="url(#stroke)" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>
      <circle cx="${hi.x}" cy="${hi.y}" r="3" fill="${getCss('--extreme-greed')}"/>
      <text x="${labelX(hi)}" y="${hi.y-9}" text-anchor="middle" fill="${getCss('--greed')}" font-size="11" font-family="IBM Plex Mono">최고 ${hi.v}</text>
      <circle cx="${lo.x}" cy="${lo.y}" r="3" fill="${getCss('--extreme-fear')}"/>
      <text x="${labelX(lo)}" y="${lo.y+17}" text-anchor="middle" fill="${getCss('--extreme-fear')}" font-size="11" font-family="IBM Plex Mono">최저 ${lo.v}</text>
      <circle cx="${last.x}" cy="${last.y}" r="8" fill="${zone(last.v).c}" opacity="0.22"/>
      <circle cx="${last.x}" cy="${last.y}" r="4" fill="${zone(last.v).c}" stroke="#fff" stroke-width="1.5"/>`;
  }

  svg.innerHTML = `
    <defs>
      <linearGradient id="stroke" gradientUnits="userSpaceOnUse" x1="0" y1="${yOf(100)}" x2="0" y2="${yOf(0)}">
        <stop offset="0" stop-color="${getCss('--grad-top')}"/>
        <stop offset="0.5" stop-color="#e9c46a"/>
        <stop offset="1" stop-color="${getCss('--grad-bot')}"/>
      </linearGradient>
      <linearGradient id="fill" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="${zone(last.v).c}" stop-opacity="0.20"/>
        <stop offset="1" stop-color="${zone(last.v).c}" stop-opacity="0"/>
      </linearGradient>
    </defs>
    ${bg}
    ${usLine}
    ${bufLine}
    ${krSvg}
    ${bufAxis}

    <path id="dragseg" d="" fill="none" stroke-width="3.2" stroke-linejoin="round" stroke-linecap="round" opacity="0"/>
    <line id="guide" x1="0" y1="${PAD.t}" x2="0" y2="${PAD.t+plotH}" stroke="#333" stroke-width="1" opacity="0"/>
    <circle id="gdot" r="4" fill="#333" opacity="0"/>
    <circle id="dstart" r="4" fill="#333" stroke="#fff" stroke-width="1.5" opacity="0"/>
    <circle id="dend"   r="4" fill="#333" stroke="#fff" stroke-width="1.5" opacity="0"/>

    <rect id="hit" x="0" y="0" width="${VB_W}" height="${VB_H}" fill="transparent" style="cursor:crosshair;touch-action:none"/>
  `;
  bindHover();
  updateHeader();
}

function updateHeader(){
  const last = DATA.kr[DATA.kr.length-1];
  const prev = DATA.kr[DATA.kr.length-2] || last;
  const z = zone(last.v);
  document.getElementById('bigval').textContent = last.v;
  const st = document.getElementById('state'); st.textContent = z.name; st.style.color = z.c;
  document.getElementById('dot').style.background = z.c;
  const diff = Math.round((last.v - prev.v)*10)/10;
  const arrow = diff>0?'▲':diff<0?'▼':'–';
  const col = diff>0?getCss('--greed'):diff<0?getCss('--extreme-fear'):getCss('--muted');
  document.getElementById('change').innerHTML = `직전 대비 <b style="color:${col}">${arrow} ${Math.abs(diff)}</b>`;
  document.getElementById('mk').style.left = `calc(${last.v}% - 1.5px)`;
}

/* ---------- 호버 + 드래그 ---------- */
function bindHover(){
  const svg=document.getElementById('chart'), hit=document.getElementById('hit');
  const guide=document.getElementById('guide'), gdot=document.getElementById('gdot');
  const tip=document.getElementById('tip'), wrap=svg.parentElement;
  const dragstat=document.getElementById('dragstat');
  const dseg=document.getElementById('dragseg'), dstart=document.getElementById('dstart'), dend=document.getElementById('dend');

  let dragOn=false, startIdx=0;

  function toIdx(clientX){
    const r=svg.getBoundingClientRect();
    const xv=(clientX-r.left)/r.width*VB_W;
    const nn=krPts.length;
    let i=Math.round((xv-PAD.l)/plotW*(nn-1));
    return Math.max(0,Math.min(nn-1,i));
  }

  // 현재 활성화된 라인들의 그날 값 목록 (비교창을 띄운 만큼 상태창에 줄이 늘어남)
  function rowsAt(i){
    const rows=[];
    if(showKR && krPts[i]){ const v=krPts[i].v, z=zone(v); rows.push({label:'한국', color:z.c, val:v, sub:z.name}); }
    if(showUS && usPts[i] && usPts[i].v!=null){ const v=usPts[i].v, z=zone(v); rows.push({label:'미국', color:getCss('--us'), val:v, sub:z.name}); }
    if(showBUF && bufPts[i] && bufPts[i].v!=null){ rows.push({label:'버핏', color:getCss('--buf'), val:bufPts[i].v+'%', sub:'시총/GDP'}); }
    return rows;
  }
  // 가이드 점을 찍을 대표 라인 (한국 → 미국 → 버핏 순)
  function primaryPt(i){
    if(showKR && krPts[i]) return {x:krPts[i].x,y:krPts[i].y,c:zone(krPts[i].v).c};
    if(showUS && usPts[i] && usPts[i].y!=null) return {x:usPts[i].x,y:usPts[i].y,c:getCss('--us')};
    if(showBUF && bufPts[i] && bufPts[i].y!=null) return {x:bufPts[i].x,y:bufPts[i].y,c:getCss('--buf')};
    return {x:krPts[i].x,y:PAD.t,c:'#888'};
  }

  function move(clientX){
    const i=toIdx(clientX);
    const rows=rowsAt(i);
    if(!rows.length){ hide(); return; }
    const p=primaryPt(i);
    guide.setAttribute('x1',p.x); guide.setAttribute('x2',p.x); guide.setAttribute('opacity','0.3');
    gdot.setAttribute('cx',p.x); gdot.setAttribute('cy',p.y); gdot.setAttribute('fill',p.c); gdot.setAttribute('opacity','1');
    const r=svg.getBoundingClientRect();
    const px=p.x/VB_W*r.width, py=p.y/VB_H*r.height;
    const date = (krPts[i]&&krPts[i].d) || (usPts[i]&&usPts[i].d) || (bufPts[i]&&bufPts[i].d) || '';
    let html=`<div class="td">${date}</div>`;
    rows.forEach(rw=>{
      html += `<div class="row"><span class="dotc" style="background:${rw.color}"></span>`
            + `<span class="lab">${rw.label}</span>`
            + `<span class="vv" style="color:${rw.color}">${rw.val}</span>`
            + (rw.sub?`<span class="sub">${rw.sub}</span>`:'') + `</div>`;
    });
    tip.innerHTML=html;
    tip.style.opacity='1';
    const th = 26 + rows.length*20;
    tip.style.left=Math.max(64,Math.min(wrap.clientWidth-64,px))+'px';
    tip.style.top =Math.max(0,py-th-10)+'px';
  }
  function hide(){ guide.setAttribute('opacity','0'); gdot.setAttribute('opacity','0'); tip.style.opacity='0'; }

  // 드래그할 대표 라인 (한국 → 미국 → 버핏)
  function dragSeries(){
    if(showKR) return {pts:krPts, fng:true};
    if(showUS) return {pts:usPts, fng:true};
    if(showBUF) return {pts:bufPts, fng:false};
    return {pts:krPts, fng:true};
  }
  function dragColor(sV,eV,fng){
    if(eV < sV) return getCss('--down');                 // 하락 → 파랑
    if(!fng)    return getCss('--up');                    // 버핏(%)은 빨강만
    // 상승 → 빨강, 극단적 탐욕(높을수록)으로 갈수록 보라
    const t=(eV-55)/(100-55);
    return lerpColor(getCss('--up'), getCss('--xgreed'), t);
  }
  function clearDrag(){
    dseg.setAttribute('d',''); dseg.setAttribute('opacity','0');
    dstart.setAttribute('opacity','0'); dend.setAttribute('opacity','0');
    dragstat.style.opacity='0';
  }
  function showDrag(a,b){
    const {pts,fng}=dragSeries();
    if(!pts.length){ clearDrag(); return; }
    let i0=Math.min(a,b), i1=Math.max(a,b);
    const seg=[]; for(let k=i0;k<=i1;k++){ if(pts[k]&&pts[k].y!=null) seg.push(pts[k]); }
    if(seg.length<2){ clearDrag(); return; }
    const sP=seg[0], eP=seg[seg.length-1];
    const delta=Math.round((eP.v-sP.v)*10)/10;
    const pct = sP.v ? Math.round((eP.v-sP.v)/Math.abs(sP.v)*1000)/10 : 0;
    const col = dragColor(sP.v, eP.v, fng);

    dseg.setAttribute('d', smoothPath(seg)); dseg.setAttribute('stroke', col); dseg.setAttribute('opacity','1');
    dstart.setAttribute('cx',sP.x); dstart.setAttribute('cy',sP.y); dstart.setAttribute('fill',col); dstart.setAttribute('opacity','1');
    dend.setAttribute('cx',eP.x);   dend.setAttribute('cy',eP.y);   dend.setAttribute('fill',col);   dend.setAttribute('opacity','1');

    const arrow = delta>0?'▲':delta<0?'▼':'–';
    dragstat.style.color=col;
    dragstat.textContent = `${arrow} ${delta>0?'+':''}${delta}  (${pct>0?'+':''}${pct}%)   ${sP.d} → ${eP.d}`;
    dragstat.style.opacity='1';
  }

  hit.addEventListener('pointerdown', e=>{
    e.preventDefault();
    dragOn=true; startIdx=toIdx(e.clientX);
    try{ hit.setPointerCapture(e.pointerId); }catch(_){}
    hide();
  });
  hit.addEventListener('pointermove', e=>{
    if(dragOn) showDrag(startIdx, toIdx(e.clientX));
    else       move(e.clientX);
  });
  hit.addEventListener('pointerup',     ()=>{ dragOn=false; clearDrag(); });
  hit.addEventListener('pointercancel', ()=>{ dragOn=false; clearDrag(); });
  // 마우스를 올리는 즉시 상태창이 뜨도록(움직이지 않아도) — '살짝 움직여야 뜨던' 문제 해결
  hit.addEventListener('pointerenter',  e=>{ if(!dragOn) move(e.clientX); });
  hit.addEventListener('pointerleave',  ()=>{ dragOn=false; clearDrag(); hide(); });
}

/* ---------- 컨트롤 ---------- */
document.getElementById('tabs').addEventListener('click', e=>{
  const b=e.target.closest('button'); if(!b) return;
  [...document.querySelectorAll('#tabs button')].forEach(x=>x.classList.remove('on'));
  b.classList.add('on');
  windowDays = +b.dataset.d;
  render();
});
document.getElementById('krbtn').addEventListener('click', e=>{
  showKR=!showKR; e.currentTarget.classList.toggle('on', showKR); render();
});
document.getElementById('usbtn').addEventListener('click', e=>{
  showUS=!showUS; e.currentTarget.classList.toggle('on', showUS); render();
});
document.getElementById('bufbtn').addEventListener('click', e=>{
  showBUF=!showBUF; e.currentTarget.classList.toggle('on', showBUF); render();
});

/* ---------- 부팅 ---------- */
function boot(data){ DATA=data; render(); }
function markReal(){
  const n=document.getElementById('note');
  if(n) n.innerHTML='<span class="badge" style="background:#e7f6ec;color:#2f9e44;border-color:#bce5c9">실제 데이터</span>'
    + 'history.json 을 불러왔습니다. korea_fng.py 를 다시 실행하면 이 차트도 갱신됩니다.';
}
fetch('history.json')
  .then(r => { if(!r.ok) throw new Error('no file'); return r.json(); })
  .then(d => { boot(d); markReal(); })
  .catch(() => boot(generateSample()));
</script>
