name: korea-fng-daily

on:
  schedule:
    # ⚠️ GitHub Actions의 cron은 UTC 기준입니다.
    #    10:00 UTC == 19:00 KST(한국시간),  1-5 == 월~금
    #    => 한국 시간 '평일 저녁 7시'에 자동 실행됩니다.
    #    시간을 바꾸려면 (원하는 KST 시각 - 9)를 UTC로 적으세요.
    - cron: '0 10 * * 1-5'
  workflow_dispatch:        # 깃허브 Actions 화면의 'Run workflow' 버튼으로 수동 실행도 가능

permissions:
  contents: write           # history.json을 다시 커밋/푸시하려면 쓰기 권한이 필요

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 1) 레포 체크아웃
        uses: actions/checkout@v4

      - name: 2) 파이썬 설치
        uses: actions/setup-python@v5
        with:
          # pykrx/pandas 휠 안정성 때문에 3.12 권장.
          # (로컬이 3.14여도 상관없음. 만약 문법 오류가 나면 '3.13'으로 바꾸세요.)
          python-version: '3.12'

      - name: 3) 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install finance-datareader pykrx pandas numpy requests

      - name: 4) 지수 계산 -> history.json 생성
        run: python korea_fng.py

      - name: 5) history.json 자동 커밋 & 푸시
        # 노션 단계보다 먼저 푸시 -> 노션 기록이 실패해도 웹 대시보드는 항상 갱신됨
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history.json
          if git diff --staged --quiet; then
            echo "변경 없음 - 커밋 건너뜀"
          else
            git commit -m "auto: history.json 업데이트 ($(date -u +'%Y-%m-%d'))"
            git push
          fi

      - name: 6) 노션 기록 (NOTION_TOKEN 시크릿 사용)
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python daily_to_notion.py
